<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Personal Dashboard Preview</title>
  <link rel="stylesheet" href="../dashboard/dist/style.css">
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222 47% 11%;
      --card: 0 0% 100%;
      --muted: 210 40% 96%;
      --muted-foreground: 215 16% 47%;
      --border: 214 32% 91%;
      --primary: 222 47% 11%;
      --primary-foreground: 210 40% 98%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }

    .preview-shell {
      margin: 0 auto;
      max-width: 1180px;
      padding: 24px;
    }

    .preview-note {
      background: #f8fafc;
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      color: hsl(var(--muted-foreground));
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
      padding: 12px 14px;
    }

    .preview-note strong {
      color: hsl(var(--foreground));
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-note">
      <strong>Preview mode.</strong>
      This page loads the real dashboard bundle with mocked Hermes API data.
      It is for trying the UI before installing Hermes.
    </div>
    <div id="preview-root"></div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    (function () {
      "use strict";

      var now = new Date().toISOString();
      var state = {
        cards: [
          {
            id: "preview-weather",
            domain: "weather",
            title: "Light rain clearing by noon",
            summary: "Carry a jacket this morning. The afternoon looks dry enough for outdoor plans.",
            priority: "high",
            status: "active",
            pinned: false,
            updated_at: now,
            source_label: "Preview weather",
            why_shown: "Configured location",
            payload: { section: "now" }
          },
          {
            id: "preview-news",
            domain: "news",
            title: "Morning briefing ready",
            summary: "Three configured topics have meaningful updates. Lower-signal items were skipped.",
            priority: "medium",
            status: "active",
            pinned: false,
            updated_at: now,
            source_label: "Preview briefing",
            why_shown: "Configured news topics",
            payload: { section: "today" }
          },
          {
            id: "preview-weekend",
            domain: "planning",
            title: "Weekend plan draft",
            summary: "Saturday morning is the best weather window. Sunday looks better for indoor plans.",
            priority: "medium",
            status: "active",
            pinned: false,
            updated_at: now,
            source_label: "Preview planner",
            why_shown: "Weekend planner enabled",
            payload: { section: "week" }
          }
        ],
        topics: [
          { id: "news-daily-news-briefing", domain: "news", label: "Daily news briefing", query: "Top important news.", enabled: true, priority: "medium", cadence: "daily" },
          { id: "weather-local-weather", domain: "weather", label: "Local weather", query: "Forecast and alerts.", enabled: true, priority: "medium", cadence: "daily" }
        ],
        preferences: {
          setup_completed: true,
          briefing_time: "07:30",
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          location: "Preview City",
          alert_frequency: "hourly",
          weekend_planner: true,
          calendar_enabled: false,
          cron_jobs: {}
        },
        refresh_runs: [
          { id: 1, job_key: "morning-briefing", status: "success", summary: "Updated preview cards.", started_at: now }
        ],
        suggestions: [
          {
            id: "preview-suggestion",
            kind: "topic",
            title: "Track a favorite team",
            summary: "Suggested example: add a sports topic for fixtures and results.",
            status: "pending",
            payload: { topic: { domain: "sports", label: "Favorite team", query: "Next games and results." } }
          }
        ]
      };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function snapshot() {
        return clone({
          cards: state.cards.filter(function (card) { return card.status !== "dismissed" && card.status !== "expired"; }),
          topics: state.topics,
          preferences: state.preferences,
          refresh_runs: state.refresh_runs,
          suggestions: state.suggestions.filter(function (item) { return item.status === "pending"; }),
          setup: {
            configured: Boolean(state.preferences.setup_completed),
            topic_count: state.topics.length,
            card_count: state.cards.length,
            preferences: state.preferences,
            db_path: "preview/cards.db"
          }
        });
      }

      function jsonResponse(payload, status) {
        return Promise.resolve(new Response(JSON.stringify(payload), {
          status: status || 200,
          headers: { "Content-Type": "application/json" }
        }));
      }

      function addStarterTopics() {
        var starters = [
          ["calendar", "Today and tomorrow"],
          ["stocks", "Market watchlist"],
          ["sports", "Favorite teams"],
          ["planning", "Weekend planner"]
        ];
        starters.forEach(function (item) {
          var id = item[0] + "-" + item[1].toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
          if (!state.topics.some(function (topic) { return topic.id === id; })) {
            state.topics.push({ id: id, domain: item[0], label: item[1], query: "Preview starter topic.", enabled: true, priority: "medium", cadence: "daily" });
          }
        });
        return { count: 6, topics: state.topics };
      }

      function addSampleCards() {
        var samples = [
          ["sample-now-weather", "weather", "Sample weather alert", "Hermes will replace this with your configured location forecast.", "now"],
          ["sample-today-briefing", "news", "Sample daily briefing", "Hermes will replace this with configured topic updates.", "today"],
          ["sample-weekend-plans", "planning", "Sample weekend planner", "Hermes will replace this with weather-aware plans.", "week"],
          ["sample-watchlist", "stocks", "Sample watchlist", "Hermes will replace this with configured watches.", "watching"]
        ];
        samples.forEach(function (item) {
          if (!state.cards.some(function (card) { return card.id === item[0]; })) {
            state.cards.push({
              id: item[0],
              domain: item[1],
              title: item[2],
              summary: item[3],
              priority: "medium",
              status: "active",
              pinned: false,
              updated_at: new Date().toISOString(),
              source_label: "Sample data",
              why_shown: "Preview mode",
              payload: { section: item[4], sample: true }
            });
          }
        });
        return { count: 4, cards: state.cards };
      }

      var realFetch = window.fetch.bind(window);
      window.fetch = function (url, options) {
        var path = String(url).replace("/api/plugins/hermes-personal-dashboard", "");
        options = options || {};

        if (path === "/snapshot") return jsonResponse(snapshot());
        if (path === "/setup/starter-topics") return jsonResponse(addStarterTopics());
        if (path === "/setup/sample-cards") return jsonResponse(addSampleCards());
        if (path === "/setup/create-cron-jobs") {
          state.preferences.cron_jobs = { morning: "preview-morning", alerts: "preview-alerts", weekend: "preview-weekend" };
          return jsonResponse({ created: [{ id: "preview-morning" }, { id: "preview-alerts" }, { id: "preview-weekend" }], existing: {}, skipped: false });
        }
        if (path === "/setup/save") {
          var setupBody = JSON.parse(options.body || "{}");
          Object.assign(state.preferences, setupBody, { setup_completed: true });
          return jsonResponse(snapshot().setup);
        }
        if (path === "/topics" && options.method === "POST") {
          var topic = JSON.parse(options.body || "{}");
          topic.id = topic.id || (topic.domain + "-" + topic.label).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
          topic.enabled = topic.enabled !== false;
          state.topics = state.topics.filter(function (item) { return item.id !== topic.id; }).concat([topic]);
          return jsonResponse({ topic: topic });
        }
        if (path.indexOf("/topics/") === 0 && options.method === "DELETE") {
          var topicId = decodeURIComponent(path.split("/").pop());
          state.topics = state.topics.filter(function (topic) { return topic.id !== topicId; });
          return jsonResponse({ deleted: 1, id: topicId });
        }
        if (path === "/suggestions/discover") {
          return jsonResponse({ created: [], count: 0 });
        }
        if (path.indexOf("/suggestions/") === 0 && path.endsWith("/accept")) {
          var acceptId = decodeURIComponent(path.split("/")[2]);
          state.suggestions = state.suggestions.map(function (item) {
            if (item.id !== acceptId) return item;
            if (item.payload && item.payload.topic) state.topics.push(Object.assign({ id: "accepted-topic", enabled: true }, item.payload.topic));
            return Object.assign({}, item, { status: "accepted" });
          });
          return jsonResponse({ suggestion: { id: acceptId, status: "accepted" } });
        }
        if (path.indexOf("/suggestions/") === 0 && path.endsWith("/dismiss")) {
          var dismissSuggestionId = decodeURIComponent(path.split("/")[2]);
          state.suggestions = state.suggestions.map(function (item) {
            return item.id === dismissSuggestionId ? Object.assign({}, item, { status: "dismissed" }) : item;
          });
          return jsonResponse({ suggestion: { id: dismissSuggestionId, status: "dismissed" } });
        }
        if (path.indexOf("/cards/") === 0) {
          var parts = path.split("/");
          var cardId = decodeURIComponent(parts[2]);
          var action = parts[3];
          state.cards = state.cards.map(function (card) {
            if (card.id !== cardId) return card;
            if (action === "dismiss") return Object.assign({}, card, { status: "dismissed" });
            if (action === "pin") return Object.assign({}, card, { pinned: true, status: "pinned" });
            if (action === "unpin") return Object.assign({}, card, { pinned: false, status: "active" });
            return card;
          });
          return jsonResponse({ card: state.cards.find(function (card) { return card.id === cardId; }) });
        }

        return realFetch(url, options);
      };

      window.__HERMES_PLUGIN_SDK__ = { React: window.React, components: {} };
      window.__HERMES_PLUGINS__ = {
        register: function (_name, Component) {
          window.ReactDOM.createRoot(document.getElementById("preview-root")).render(
            window.React.createElement(Component)
          );
        }
      };
    })();
  </script>
  <script src="../dashboard/dist/index.js"></script>
</body>
</html>
