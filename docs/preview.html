<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Personal Dashboard Preview</title>
  <link rel="stylesheet" href="../dashboard/dist/style.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at 9% 70%, rgba(4, 167, 206, 0.14) 0 4px, transparent 5px),
        radial-gradient(circle at 91% 24%, rgba(0, 94, 216, 0.12) 0 3px, transparent 4px),
        repeating-linear-gradient(0deg, rgba(0, 94, 216, 0.045) 0 1px, transparent 1px 44px),
        repeating-linear-gradient(90deg, rgba(0, 94, 216, 0.04) 0 1px, transparent 1px 44px),
        linear-gradient(135deg, #f5fbff, #dcefff);
      color: #075bc0;
      font-family: Georgia, "Times New Roman", serif;
      margin: 0;
      min-height: 100%;
    }

    .preview-shell {
      margin: 0 auto;
      max-width: 1240px;
      padding: 8px;
    }

    .preview-note {
      background: rgba(235, 246, 255, 0.62);
      border: 1px solid rgba(0, 94, 216, 0.24);
      color: #4f8fd5;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 8px;
      padding: 12px 14px;
    }

    .preview-note strong {
      color: #005ed8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-note">
      <strong>Preview mode.</strong>
      This page loads the real dashboard bundle with mocked Hermes memory,
      session, and cron data. It is for trying the zero-setup UI before
      installing Hermes.
    </div>
    <div id="preview-root"></div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    (function () {
      "use strict";

      var now = new Date().toISOString();
      var state = {
        cards: [
          {
            id: "news-ai-briefing",
            context_id: "context-news-ai",
            domain: "news",
            title: "AI news briefing",
            summary: "Three high-signal AI updates are worth checking this morning; routine funding and model-wrapper noise stayed out.",
            priority: "medium",
            status: "active",
            pinned: false,
            updated_at: now,
            source_label: "Hermes memory + morning news refresh",
            why_shown: "Hermes inferred AI news belongs in the morning brief.",
            payload: { section: "today", ai_curated: true, relevance_score: 42 }
          },
          {
            id: "weather-local-now",
            context_id: "context-weather-local",
            domain: "weather",
            title: "Weather can affect today",
            summary: "The current forecast is relevant enough to keep in Now because Hermes has weather and planning signals.",
            priority: "high",
            status: "active",
            pinned: false,
            updated_at: now,
            source_label: "Hermes memory + weather refresh",
            why_shown: "Hermes found weather and planning context.",
            payload: { section: "now", ai_curated: true, relevance_score: 55 }
          },
          {
            id: "projects-github-watch",
            context_id: "context-projects-github",
            domain: "projects",
            title: "GitHub issue work",
            summary: "A recurring project/GitHub thread is still worth watching; no urgent issue is promoted to Now.",
            priority: "low",
            status: "active",
            pinned: false,
            updated_at: now,
            source_label: "Hermes sessions",
            why_shown: "Hermes sees repeated GitHub issue/project work.",
            payload: { section: "watching", ai_curated: true, relevance_score: 15 }
          }
        ],
        context_items: [
          {
            id: "context-news-ai",
            domain: "news",
            label: "AI news briefing",
            summary: "Hermes has this in its memory history: User wants AI news in the morning.",
            source_types: ["memory", "session"],
            confidence: 0.82,
            score: 2.3
          },
          {
            id: "context-weather-local",
            domain: "weather",
            label: "Local weather and weekend planning",
            summary: "Hermes has this in its memory history: User asks for weather and weekend plans.",
            source_types: ["memory"],
            confidence: 0.72,
            score: 1.4
          },
          {
            id: "context-projects-github",
            domain: "projects",
            label: "GitHub issue work",
            summary: "Hermes has this in its session history: user asks about GitHub issues and project status.",
            source_types: ["session"],
            confidence: 0.68,
            score: 1.1
          }
        ],
        preferences: {
          autonomous_mode: true,
          last_auto_refresh_at: now,
          cron_jobs: {}
        },
        source_report: {
          source_count: 4,
          by_type: { memory: 1, session: 2, cron_job: 1 },
          labels_by_type: { memory: ["MEMORY.md"], session: ["state.db:messages"], cron_job: ["cron/jobs.json"] },
          checks: {
            memory_files: [{ label: "MEMORY.md", path: "~/.hermes/memories/MEMORY.md", exists: true, bytes: 2048 }],
            state_db: { path: "~/.hermes/state.db", exists: true, bytes: 123456, scanned: true },
            cron_jobs: { path: "~/.hermes/cron/jobs.json", exists: true, bytes: 512, scanned: true },
            cron_output: { path: "~/.hermes/cron/output", exists: true, file_count: 0, scanned: true }
          }
        },
        refresh_runs: [
          {
            id: 1,
            job_key: "hermes-context-reflection",
            status: "success",
            summary: "Scanned mocked Hermes memory and sessions, inferred 3 context signals.",
            started_at: now
          }
        ],
        automation: {
          refreshed: true,
          sources: 4,
          context_count: 3,
          card_count: 3,
          mode: "autonomous"
        },
        curation: {
          state: "active",
          title: "Hermes-curated cards",
          message: "3 useful card(s) are ranked by priority, freshness, and time relevance.",
          curated_card_count: 3,
          context_count: 3,
          source_count: 4,
          last_auto_refresh_at: now,
          scanner_cards_suppressed: 0
        }
      };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function snapshot() {
        return clone({
          cards: state.cards.filter(function (card) { return card.status !== "dismissed" && card.status !== "expired"; }),
          context_items: state.context_items.filter(function (item) { return item.status !== "hidden"; }),
          preferences: state.preferences,
          refresh_runs: state.refresh_runs,
          source_report: state.source_report,
          status: {
            mode: "autonomous",
            requires_configuration: false,
            context_count: state.context_items.filter(function (item) { return item.status !== "hidden"; }).length,
            card_count: state.cards.length,
            preferences: state.preferences,
            db_path: "preview/cards.db"
          },
          automation: state.automation,
          curation: state.curation
        });
      }

      function jsonResponse(payload, status) {
        return Promise.resolve(new Response(JSON.stringify(payload), {
          status: status || 200,
          headers: { "Content-Type": "application/json" }
        }));
      }

      function addScanResult() {
        var scanId = "context-family-school";
        if (!state.context_items.some(function (item) { return item.id === scanId; })) {
          state.context_items.push({
            id: scanId,
            domain: "family",
            label: "Daycare lunch and daily summary",
            summary: "Hermes has this in its session history: user receives daycare lunch menus and daily notes.",
            source_types: ["session"],
            confidence: 0.73,
            score: 1.6
          });
        }
        state.automation = {
          refreshed: true,
          sources: 5,
          context_count: state.context_items.length,
          card_count: state.cards.length,
          mode: "autonomous"
        };
        state.curation = {
          state: "active",
          title: "Hermes-curated cards",
          message: state.cards.length + " useful card(s) are ranked by priority, freshness, and time relevance. One new signal is waiting for the next curator refresh.",
          curated_card_count: state.cards.length,
          context_count: state.context_items.length,
          source_count: 5,
          last_auto_refresh_at: new Date().toISOString(),
          scanner_cards_suppressed: 0
        };
        state.source_report = {
          source_count: 5,
          by_type: { memory: 1, session: 3, cron_job: 1 },
          labels_by_type: { memory: ["MEMORY.md"], session: ["state.db:messages"], cron_job: ["cron/jobs.json"] },
          checks: state.source_report.checks
        };
        state.refresh_runs.unshift({
          id: state.refresh_runs.length + 1,
          job_key: "hermes-context-reflection",
          status: "success",
          summary: "Preview scan found one additional session-derived context item.",
          started_at: new Date().toISOString()
        });
        return {
          sources: 5,
          context_items: state.context_items,
          cards: [],
          scanner_cards_suppressed: 0,
          mode: "autonomous"
        };
      }

      var realFetch = window.fetch.bind(window);
      window.fetch = function (url, options) {
        var path = String(url).replace("/api/plugins/hermes-personal-dashboard", "");
        options = options || {};

        if (path.indexOf("/snapshot") === 0) return jsonResponse(snapshot());
        if (path === "/context") return jsonResponse({ context_items: snapshot().context_items });
        if (path === "/context/refresh") return jsonResponse(addScanResult());
        if (path === "/automation/ensure-jobs") {
          state.preferences.cron_unavailable = "cron integration unavailable in preview";
          return jsonResponse({
            created: [],
            existing: {},
            skipped: true,
            error: "cron integration unavailable in preview",
            next_step: "Open Hermes and run `/personal-dashboard create-jobs` where the Hermes cron runtime is available."
          });
        }
        if (path.indexOf("/context/") === 0 && path.endsWith("/hide")) {
          var contextId = decodeURIComponent(path.split("/")[2]);
          state.context_items = state.context_items.map(function (item) {
            return item.id === contextId ? Object.assign({}, item, { status: "hidden" }) : item;
          });
          state.cards = state.cards.map(function (card) {
            return card.context_id === contextId ? Object.assign({}, card, { status: "dismissed" }) : card;
          });
          return jsonResponse({ context_item: state.context_items.find(function (item) { return item.id === contextId; }) });
        }
        if (path.indexOf("/cards/") === 0) {
          var parts = path.split("/");
          var cardId = decodeURIComponent(parts[2]);
          var action = parts[3];
          state.cards = state.cards.map(function (card) {
            if (card.id !== cardId) return card;
            if (action === "dismiss") return Object.assign({}, card, { status: "dismissed" });
            if (action === "pin") return Object.assign({}, card, { pinned: true, status: "pinned" });
            if (action === "unpin") return Object.assign({}, card, { pinned: false, status: "active" });
            return card;
          });
          return jsonResponse({ card: state.cards.find(function (card) { return card.id === cardId; }) });
        }

        return realFetch(url, options);
      };

      window.__HERMES_PLUGIN_SDK__ = { React: window.React, components: {} };
      window.__HERMES_PLUGINS__ = {
        register: function (_name, Component) {
          window.ReactDOM.createRoot(document.getElementById("preview-root")).render(
            window.React.createElement(Component)
          );
        }
      };
    })();
  </script>
  <script src="../dashboard/dist/index.js"></script>
</body>
</html>
